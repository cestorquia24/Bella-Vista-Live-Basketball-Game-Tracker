<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV Court Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --col-normal:  #ffffff;
            --col-warn:    #f59e0b;
            --col-danger:  #ef4444;
            --col-sc-ok:   #48bb78;
            --col-sc-warn: #f59e0b;
            --col-sc-danger: #ef4444;
            --col-bg:      #0a0a0a;
            --col-divider: #1a202c;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--col-bg);
            color: var(--col-normal);
            font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
        }

        /* ── Layout ────────────────────────────────── */
        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ───────────────────────────────── */
        .top-bar {
            background: #111827;
            border-bottom: 3px solid #2d3748;
            padding: 0 28px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .top-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .league-logo {
            width: 58px;
            height: 58px;
            object-fit: contain;
            border-radius: 6px;
        }

        .league-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6em;
            letter-spacing: 0.12em;
            color: #48bb78;
            line-height: 1;
        }

        .quarter-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8em;
            letter-spacing: 0.1em;
            color: #f6e05e;
            padding: 0 24px;
            border-left: 2px solid #2d3748;
            border-right: 2px solid #2d3748;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .team-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo-small {
            width: 46px;
            height: 46px;
            object-fit: contain;
            border-radius: 4px;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .team-info.left { align-items: flex-start; }

        .team-name-top {
            font-size: 0.72em;
            color: #a0aec0;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
        }

        .team-score-top {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            color: #f7fafc;
        }

        .score-vs {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6em;
            color: #4a5568;
        }

        /* ── Clocks area ───────────────────────────── */
        .clocks-area {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Game Timer Panel ──────────────────────── */
        .game-time-panel {
            flex: 1.1;
            border-right: 4px solid var(--col-divider);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        .panel-label {
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: #4a5568;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .game-time-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5em, 16vw, 13em);
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            color: var(--col-normal);
            transition: color 0.4s;
            letter-spacing: 0.02em;
        }

        /* ── Shot Clock Panel ──────────────────────── */
        .shot-clock-panel {
            flex: 0.9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        .shot-clock-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(7em, 22vw, 18em);
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            color: var(--col-sc-ok);
            transition: color 0.3s;
        }

        /* ── Sponsor area ──────────────────────────── */
        .sponsor-wrap {
            position: absolute;
            bottom: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .sponsor-label {
            font-size: 0.6em;
            letter-spacing: 0.18em;
            color: #4a5568;
            text-transform: uppercase;
        }

        .sponsor-logo {
            max-height: 38px;
            max-width: 140px;
            object-fit: contain;
            opacity: 0.85;
            filter: brightness(1.3) saturate(0.8);
        }

        /* ── Color states ──────────────────────────── */
        .game-time-value.warn   { color: var(--col-warn);   }
        .game-time-value.danger { color: var(--col-danger); }

        .shot-clock-value.warn  { color: var(--col-sc-warn);   }
        .shot-clock-value.danger{ color: var(--col-sc-danger); }

        /* Pulse on danger */
        @keyframes pulse {
            0%, 100% { opacity: 1;   transform: scale(1);    }
            50%       { opacity: 0.55; transform: scale(0.97); }
        }
        .danger { animation: pulse 0.55s ease-in-out infinite; }

        /* Glow on shot clock danger */
        .shot-clock-value.danger {
            text-shadow: 0 0 40px rgba(239,68,68,0.7), 0 0 80px rgba(239,68,68,0.4);
        }
        .shot-clock-value.warn {
            text-shadow: 0 0 30px rgba(245,158,11,0.5);
        }

        /* ── Waiting overlay ───────────────────────── */
        #waitingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(10,10,10,0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            z-index: 99;
        }

        .waiting-logo {
            width: 90px;
            opacity: 0.35;
            animation: breathe 2.4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.25; transform: scale(0.96); }
            50%       { opacity: 0.5;  transform: scale(1.02); }
        }

        .waiting-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2em;
            color: #2d3748;
            letter-spacing: 0.25em;
        }

        /* ── Possession dot ────────────────────────── */
        .poss-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            margin-left: 8px;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(72,187,120,0.8);
        }
        .poss-dot.hidden { visibility: hidden; }
    </style>
</head>
<body>
<div class="page">

    <!-- ── Top Bar ───────────────────────────────── -->
    <div class="top-bar">
        <div class="top-left">
            <img src="bellaLogo.jpg" class="league-logo" alt="BV">
            <div class="league-name">Bella Vista<br>League</div>
        </div>

        <div class="quarter-badge" id="quarterBadge">Q1</div>

        <div class="scoreboard">
            <div class="team-block">
                <div class="team-info left">
                    <div class="team-name-top" id="team1Name">TEAM 1</div>
                    <div class="team-score-top" id="team1Score">0 <span class="poss-dot hidden" id="poss1"></span></div>
                </div>
                <img id="team1Logo" class="team-logo-small" src="" alt="" style="display:none">
            </div>

            <div class="score-vs">–</div>

            <div class="team-block">
                <img id="team2Logo" class="team-logo-small" src="" alt="" style="display:none">
                <div class="team-info">
                    <div class="team-name-top" id="team2Name">TEAM 2</div>
                    <div class="team-score-top"><span class="poss-dot hidden" id="poss2"></span> <span id="team2Score">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Clocks ─────────────────────────────────── -->
    <div class="clocks-area">

        <!-- Game Timer -->
        <div class="game-time-panel">
            <div class="panel-label">Game Time</div>
            <div class="game-time-value" id="gameTimerVal">10:00</div>
        </div>

        <!-- Shot Clock -->
        <div class="shot-clock-panel">
            <div class="panel-label">Shot Clock</div>
            <div class="shot-clock-value" id="shotClockVal">24</div>

            <!-- Sponsor — replace sponsor-logo.png with your actual sponsor image file -->
            <div class="sponsor-wrap" id="sponsorWrap">
                <div class="sponsor-label">Official Timekeeper</div>
                <img src="sponsor-logo.png" class="sponsor-logo" id="sponsorLogo" alt="Sponsor"
                     onerror="document.getElementById('sponsorWrap').style.display='none'">
            </div>
        </div>

    </div>
</div>

<!-- Waiting overlay -->
<div id="waitingOverlay">
    <img src="bellaLogo.jpg" class="waiting-logo" alt="BV">
    <div class="waiting-text">Waiting for game…</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey:            "AIzaSyCRjX0GdMHSNeykGuxclCgSc3XpY04-oEE",
        authDomain:        "bella-vista-league-live-score.firebaseapp.com",
        databaseURL:       "https://bella-vista-league-live-score-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "bella-vista-league-live-score",
        storageBucket:     "bella-vista-league-live-score.firebasestorage.app",
        messagingSenderId: "563016772281",
        appId:             "1:563016772281:web:e2c3b5d3a08c2bc9308968"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ── Elements ────────────────────────────────────
    const gameTimerEl  = document.getElementById('gameTimerVal');
    const shotClockEl  = document.getElementById('shotClockVal');
    const quarterEl    = document.getElementById('quarterBadge');
    const team1NameEl  = document.getElementById('team1Name');
    const team2NameEl  = document.getElementById('team2Name');
    const team1ScoreEl = document.getElementById('team1Score');
    const team2ScoreEl = document.getElementById('team2Score');
    const team1LogoEl  = document.getElementById('team1Logo');
    const team2LogoEl  = document.getElementById('team2Logo');
    const poss1El      = document.getElementById('poss1');
    const poss2El      = document.getElementById('poss2');
    const overlay      = document.getElementById('waitingOverlay');

    let _gtInterval = null;
    let _scInterval = null;

    // ── Game Timer sync ──────────────────────────────
    function syncGameTimer(seconds, running, lastUpdated) {
        const elapsed  = lastUpdated ? Math.max(0, Math.floor((Date.now() - lastUpdated) / 1000)) : 0;
        const expected = Math.max(0, seconds - (running ? elapsed : 0));

        // Smooth-resync: skip restart if already running and in sync
        if (running && _gtInterval !== null) {
            const cur = parseTimerStr(gameTimerEl.textContent);
            if (cur === expected) return;
        }

        if (_gtInterval) { clearInterval(_gtInterval); _gtInterval = null; }

        let display = expected;
        updateGameTimerDisplay(display);
        if (!running || display <= 0) return;

        _gtInterval = setInterval(() => {
            display = Math.max(0, display - 1);
            updateGameTimerDisplay(display);
            if (display <= 0) { clearInterval(_gtInterval); _gtInterval = null; }
        }, 1000);
    }

    function parseTimerStr(str) {
        const [m, s] = str.split(':').map(Number);
        return (m * 60) + (s || 0);
    }

    function updateGameTimerDisplay(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        gameTimerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;

        gameTimerEl.classList.remove('warn', 'danger');
        if      (seconds <= 30) gameTimerEl.classList.add('danger');
        else if (seconds <= 60) gameTimerEl.classList.add('warn');
    }

    // ── Shot Clock sync ──────────────────────────────
    function syncShotClock(seconds, running, lastUpdated) {
        const elapsed  = lastUpdated ? Math.max(0, Math.floor((Date.now() - lastUpdated) / 1000)) : 0;
        const expected = Math.max(0, seconds - (running ? elapsed : 0));

        // Smooth-resync: skip restart if already running and in sync
        if (running && _scInterval !== null) {
            const shown = parseInt(shotClockEl.textContent) || 0;
            if (shown === expected) return;
        }

        if (_scInterval) { clearInterval(_scInterval); _scInterval = null; }

        let display = expected;
        updateShotClockDisplay(display);
        if (!running || display <= 0) return;

        _scInterval = setInterval(() => {
            display = Math.max(0, display - 1);
            updateShotClockDisplay(display);
            if (display <= 0) { clearInterval(_scInterval); _scInterval = null; }
        }, 1000);
    }

    function updateShotClockDisplay(val) {
        shotClockEl.textContent = val;
        shotClockEl.classList.remove('warn', 'danger');
        if      (val <= 5)  shotClockEl.classList.add('danger');
        else if (val <= 10) shotClockEl.classList.add('warn');
    }

    // ── Score helper ─────────────────────────────────
    function calcScore(team) {
        if (!team || !team.players) return 0;
        return team.players.reduce((sum, p) => {
            return sum + Object.values(p.quarterStats || {}).reduce((s, qs) => {
                return s + (qs && qs.points ? qs.points : 0);
            }, 0);
        }, 0);
    }

    // ── Firebase listener ─────────────────────────────
    database.ref('liveGame').on('value', snap => {
        const d = snap.val();

        // Show overlay if no active game
        const isLive = d && d.isLive !== false && d.lastUpdated &&
                       (Date.now() - d.lastUpdated < 600000);
        if (!isLive) {
            overlay.style.display = 'flex';
            if (_gtInterval) { clearInterval(_gtInterval); _gtInterval = null; }
            if (_scInterval) { clearInterval(_scInterval); _scInterval = null; }
            return;
        }
        overlay.style.display = 'none';

        // Quarter
        const q = d.currentQuarter;
        quarterEl.textContent = q === 'total' ? 'FINAL' : (q ? `Q${q}` : 'Q1');

        // Teams + scores
        if (d.team1) {
            team1NameEl.textContent  = (d.team1.name || 'TEAM 1').toUpperCase();
            team1ScoreEl.textContent = calcScore(d.team1);
            if (d.team1.logo) {
                team1LogoEl.src          = d.team1.logo;
                team1LogoEl.style.display = 'block';
            }
        }
        if (d.team2) {
            team2NameEl.textContent  = (d.team2.name || 'TEAM 2').toUpperCase();
            team2ScoreEl.textContent = calcScore(d.team2);
            if (d.team2.logo) {
                team2LogoEl.src          = d.team2.logo;
                team2LogoEl.style.display = 'block';
            }
        }

        // Possession dots
        const poss = d.possession;
        poss1El.classList.toggle('hidden', poss !== 'team1');
        poss2El.classList.toggle('hidden', poss !== 'team2');

        // Timers
        if (d.gameTimer) {
            syncGameTimer(d.gameTimer.seconds || 0, !!d.gameTimer.isRunning, d.lastUpdated);
        }
        if (d.shotClock) {
            syncShotClock(d.shotClock.seconds || 0, !!d.shotClock.isRunning, d.lastUpdated);
        }
    });
</script>
</body>
</html>
