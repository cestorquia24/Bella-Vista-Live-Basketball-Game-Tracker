<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV Court Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
        }

        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Scoreboard bar ─────────────────────────── */
        .score-bar {
            background: #0d1117;
            border-bottom: 3px solid #1a2230;
            height: 116px;
            flex-shrink: 0;
            display: flex;
            align-items: stretch;
        }

        .team-score-block {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 18px;
            min-width: 0;
        }
        .team-score-block.right { flex-direction: row-reverse; }

        .tsb-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .tsb-info { display: flex; flex-direction: column; min-width: 0; }
        .team-score-block.right .tsb-info { align-items: flex-end; }

        .tsb-name {
            font-size: 0.8em;
            letter-spacing: 0.2em;
            color: #4b5563;
            text-transform: uppercase;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tsb-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5em;
            line-height: 0.88;
            font-variant-numeric: tabular-nums;
            color: #f9fafb;
            letter-spacing: 0.02em;
        }

        /* Possession dot */
        .poss-dot {
            display: inline-block;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #4ade80;
            margin: 0 5px;
            vertical-align: middle;
            box-shadow: 0 0 10px rgba(74,222,128,0.9);
        }
        .poss-dot.hidden { visibility: hidden; }

        /* Center: quarter */
        .center-block {
            flex-shrink: 0;
            width: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 2px solid #1a2230;
            border-right: 2px solid #1a2230;
        }

        .center-label {
            font-size: 0.62em;
            letter-spacing: 0.22em;
            color: #4ade80;
            text-transform: uppercase;
        }

        .quarter-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4.2em;
            line-height: 0.95;
            color: #fbbf24;
            letter-spacing: 0.06em;
        }

        /* ── Clock panels ───────────────────────────── */
        .clocks-area {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .clock-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.25s;
        }

        .clock-panel.left {
            border-right: 3px solid #111827;
        }

        /* In single-clock mode, remove the divider */
        .clocks-area.single .clock-panel.left {
            border-right: none;
        }

        .clock-label {
            position: absolute;
            top: 22px;
            font-size: 0.95em;
            font-weight: 700;
            letter-spacing: 0.38em;
            color: #1f2937;
            text-transform: uppercase;
        }

        /* ── Game Timer ─────────────────────────────── */
        .game-time-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(6em, 19vw, 17em);
            line-height: 0.88;
            font-variant-numeric: tabular-nums;
            color: #f9fafb;
            letter-spacing: 0.02em;
            transition: color 0.35s;
        }

        /* Full-screen single mode: fill the whole panel */
        .clocks-area.single .game-time-val {
            font-size: clamp(8em, 32vw, 28em);
        }

        .game-time-val.warn   { color: #f59e0b; }
        .game-time-val.danger { color: #ef4444; }

        /* ── Shot Clock ─────────────────────────────── */
        .shot-clock-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(10em, 28vw, 26em);
            line-height: 0.88;
            font-variant-numeric: tabular-nums;
            color: #4ade80;
            transition: color 0.25s;
        }

        /* Full-screen single mode */
        .clocks-area.single .shot-clock-val {
            font-size: clamp(14em, 52vw, 48em);
        }

        .shot-clock-val.warn {
            color: #fb923c;
            text-shadow: 0 0 50px rgba(251,146,60,0.45);
        }
        .shot-clock-val.danger {
            color: #ef4444;
            text-shadow: 0 0 60px rgba(239,68,68,0.85), 0 0 120px rgba(239,68,68,0.4);
        }

        /* ── Danger pulse ───────────────────────────── */
        @keyframes pulse {
            0%, 100% { opacity: 1;    transform: scale(1);    }
            50%       { opacity: 0.45; transform: scale(0.95); }
        }
        .danger { animation: pulse 0.48s ease-in-out infinite; }

        /* ── Panel flash: shot clock danger ────────── */
        @keyframes panelFlash {
            0%, 100% { background: rgba(239,68,68,0.06); }
            50%       { background: rgba(239,68,68,0.18); }
        }
        .sc-panel-danger { animation: panelFlash 0.48s ease-in-out infinite; }

        /* ── Panel tint: game timer warn/danger ─────── */
        .gt-panel-warn   { background: rgba(245,158,11,0.04); }
        .gt-panel-danger { background: rgba(239,68,68,0.06); }

        /* ── Sponsor ────────────────────────────────── */
        .sponsor-wrap {
            position: absolute;
            bottom: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .sponsor-label {
            font-size: 0.6em;
            letter-spacing: 0.2em;
            color: #1f2937;
            text-transform: uppercase;
        }
        .sponsor-logo {
            max-height: 38px;
            max-width: 140px;
            object-fit: contain;
            opacity: 0.65;
            filter: brightness(1.5) saturate(0.7);
        }

        /* ── Waiting overlay ────────────────────────── */
        #waitingOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 26px;
            z-index: 99;
        }
        .waiting-logo {
            width: 96px;
            animation: breathe 2.6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.18; transform: scale(0.94); }
            50%       { opacity: 0.45; transform: scale(1.03); }
        }
        .waiting-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6em;
            color: #1f2937;
            letter-spacing: 0.32em;
        }
    </style>
</head>
<body>
<div class="page">

    <!-- ── Scoreboard Bar ──────────────────────────── -->
    <div class="score-bar">
        <div class="team-score-block left">
            <img id="team1Logo" class="tsb-logo" src="" alt="" style="display:none">
            <div class="tsb-info">
                <div class="tsb-name" id="team1Name">TEAM 1</div>
                <div class="tsb-score">
                    <span id="team1Score">0</span><span class="poss-dot hidden" id="poss1"></span>
                </div>
            </div>
        </div>

        <div class="center-block">
            <div class="center-label">Quarter</div>
            <div class="quarter-display" id="quarterBadge">Q1</div>
        </div>

        <div class="team-score-block right">
            <img id="team2Logo" class="tsb-logo" src="" alt="" style="display:none">
            <div class="tsb-info">
                <div class="tsb-name" id="team2Name">TEAM 2</div>
                <div class="tsb-score">
                    <span class="poss-dot hidden" id="poss2"></span><span id="team2Score">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Clocks ─────────────────────────────────── -->
    <div class="clocks-area" id="clocksArea">

        <div class="clock-panel left" id="gameTimePanel">
            <div class="clock-label">Game Time</div>
            <div class="game-time-val" id="gameTimerVal">10:00</div>
        </div>

        <div class="clock-panel right" id="shotClockPanel">
            <div class="clock-label">Shot Clock</div>
            <div class="shot-clock-val" id="shotClockVal">24</div>

            <div class="sponsor-wrap" id="sponsorWrap">
                <div class="sponsor-label">Official Timekeeper</div>
                <img src="sponsor-logo.png" class="sponsor-logo" alt="Sponsor"
                     onerror="document.getElementById('sponsorWrap').style.display='none'">
            </div>
        </div>

    </div>
</div>

<!-- Waiting overlay -->
<div id="waitingOverlay">
    <img src="bellaLogo.jpg" class="waiting-logo" alt="BV">
    <div class="waiting-text">Waiting for game…</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    // ── Mode: ?mode=timer | ?mode=shotclock | (both) ──
    const mode = new URLSearchParams(window.location.search).get('mode');
    const clocksArea     = document.getElementById('clocksArea');
    const gameTimePanelEl = document.getElementById('gameTimePanel');
    const shotClockPanelEl = document.getElementById('shotClockPanel');

    if (mode === 'timer') {
        shotClockPanelEl.style.display = 'none';
        clocksArea.classList.add('single');
        document.title = 'BV Game Time';
    } else if (mode === 'shotclock') {
        gameTimePanelEl.style.display = 'none';
        clocksArea.classList.add('single');
        document.title = 'BV Shot Clock';
    }

    // ── Firebase ──────────────────────────────────────
    const firebaseConfig = {
        apiKey:            "AIzaSyCRjX0GdMHSNeykGuxclCgSc3XpY04-oEE",
        authDomain:        "bella-vista-league-live-score.firebaseapp.com",
        databaseURL:       "https://bella-vista-league-live-score-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "bella-vista-league-live-score",
        storageBucket:     "bella-vista-league-live-score.firebasestorage.app",
        messagingSenderId: "563016772281",
        appId:             "1:563016772281:web:e2c3b5d3a08c2bc9308968"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ── Elements ──────────────────────────────────────
    const gameTimerEl    = document.getElementById('gameTimerVal');
    const shotClockEl    = document.getElementById('shotClockVal');
    const quarterEl      = document.getElementById('quarterBadge');
    const team1NameEl    = document.getElementById('team1Name');
    const team2NameEl    = document.getElementById('team2Name');
    const team1ScoreEl   = document.getElementById('team1Score');
    const team2ScoreEl   = document.getElementById('team2Score');
    const team1LogoEl    = document.getElementById('team1Logo');
    const team2LogoEl    = document.getElementById('team2Logo');
    const poss1El        = document.getElementById('poss1');
    const poss2El        = document.getElementById('poss2');
    const overlay        = document.getElementById('waitingOverlay');
    const gameTimePanel  = document.getElementById('gameTimePanel');
    const shotClockPanel = document.getElementById('shotClockPanel');

    let _gtDisplay  = 0;
    let _scDisplay  = 0;
    let _gtInterval = null;
    let _scInterval = null;

    // Last timer values received from Firebase — used to skip syncs when
    // a non-timer push (e.g. score-add) arrives with unchanged timer data.
    let _lastGTSeconds = -1;
    let _lastGTRunning = false;
    let _lastSCSeconds = -1;
    let _lastSCRunning = false;

    // ── Game Timer sync ────────────────────────────────
    function syncGameTimer(seconds, running) {
        // If the interval is already running and the incoming value is within ±1
        // of what we're currently showing, absorb the drift silently.
        // This prevents the "adds 1 second" snap caused by stale timer values
        // piggybacked on shot-clock-reset Firebase pushes.
        if (_gtInterval && running && Math.abs(seconds - _gtDisplay) <= 1) return;
        if (_gtInterval) { clearInterval(_gtInterval); _gtInterval = null; }
        _gtDisplay = Math.max(0, seconds);
        updateGameTimerDisplay(_gtDisplay);
        if (!running || _gtDisplay <= 0) return;
        _gtInterval = setInterval(() => {
            _gtDisplay = Math.max(0, _gtDisplay - 1);
            updateGameTimerDisplay(_gtDisplay);
            if (_gtDisplay <= 0) { clearInterval(_gtInterval); _gtInterval = null; }
        }, 1000);
    }

    function parseTimerStr(str) {
        const [m, s] = str.split(':').map(Number);
        return (m * 60) + (s || 0);
    }

    function updateGameTimerDisplay(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        gameTimerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
        gameTimerEl.classList.remove('warn', 'danger');
        gameTimePanel.classList.remove('gt-panel-warn', 'gt-panel-danger');
        if (seconds <= 30) {
            gameTimerEl.classList.add('danger');
            gameTimePanel.classList.add('gt-panel-danger');
        } else if (seconds <= 60) {
            gameTimerEl.classList.add('warn');
            gameTimePanel.classList.add('gt-panel-warn');
        }
    }

    // ── Shot Clock sync ────────────────────────────────
    function syncShotClock(seconds, running) {
        if (_scInterval) { clearInterval(_scInterval); _scInterval = null; }
        _scDisplay = Math.max(0, seconds);
        updateShotClockDisplay(_scDisplay);
        if (!running || _scDisplay <= 0) return;
        _scInterval = setInterval(() => {
            _scDisplay = Math.max(0, _scDisplay - 1);
            updateShotClockDisplay(_scDisplay);
            if (_scDisplay <= 0) { clearInterval(_scInterval); _scInterval = null; }
        }, 1000);
    }

    function updateShotClockDisplay(val) {
        shotClockEl.textContent = val;
        shotClockEl.classList.remove('warn', 'danger');
        shotClockPanel.classList.remove('sc-panel-danger');
        if (val <= 5) {
            shotClockEl.classList.add('danger');
            shotClockPanel.classList.add('sc-panel-danger');
        } else if (val <= 10) {
            shotClockEl.classList.add('warn');
        }
    }

    // ── Firebase listener ──────────────────────────────
    database.ref('liveGame').on('value', snap => {
        const d = snap.val();

        const isActive = d && d.team1 && d.team1.name && d.team2 && d.team2.name;
        if (!isActive) {
            overlay.style.display = 'flex';
            if (_gtInterval) { clearInterval(_gtInterval); _gtInterval = null; }
            if (_scInterval) { clearInterval(_scInterval); _scInterval = null; }
            // Reset cache so next game always triggers a full re-sync on first push
            _lastGTSeconds = -1; _lastGTRunning = false;
            _lastSCSeconds = -1; _lastSCRunning = false;
            return;
        }
        overlay.style.display = 'none';

        // Quarter
        const q = d.currentQuarter;
        quarterEl.textContent = q === 'total' ? 'FINAL' : (q ? `Q${q}` : 'Q1');

        // Teams + scores
        if (d.team1) {
            team1NameEl.textContent  = (d.team1.name || 'TEAM 1').toUpperCase();
            team1ScoreEl.textContent = d.team1Score != null ? d.team1Score : 0;
            if (d.team1.logo) { team1LogoEl.src = d.team1.logo; team1LogoEl.style.display = 'block'; }
        }
        if (d.team2) {
            team2NameEl.textContent  = (d.team2.name || 'TEAM 2').toUpperCase();
            team2ScoreEl.textContent = d.team2Score != null ? d.team2Score : 0;
            if (d.team2.logo) { team2LogoEl.src = d.team2.logo; team2LogoEl.style.display = 'block'; }
        }

        // Possession dots
        const poss = d.possession;
        poss1El.classList.toggle('hidden', poss !== 'team1');
        poss2El.classList.toggle('hidden', poss !== 'team2');

        // Timers — only sync when values actually changed (skip score-add pushes)
        if (mode !== 'shotclock' && d.gameTimer) {
            const gtSecs = d.gameTimer.currentSeconds || 0;
            const gtRun  = !!d.gameTimer.isRunning;
            if (gtSecs !== _lastGTSeconds || gtRun !== _lastGTRunning) {
                _lastGTSeconds = gtSecs;
                _lastGTRunning = gtRun;
                syncGameTimer(gtSecs, gtRun);
            }
        }
        if (mode !== 'timer' && d.shotClock) {
            const scSecs = d.shotClock.seconds || 0;
            const scRun  = !!d.shotClock.isRunning;
            if (scSecs !== _lastSCSeconds || scRun !== _lastSCRunning) {
                _lastSCSeconds = scSecs;
                _lastSCRunning = scRun;
                syncShotClock(scSecs, scRun);
            }
        }
    });
</script>
</body>
</html>
