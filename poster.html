<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Player Poster</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#48bb78">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BV Tracker">
    <link rel="apple-touch-icon" href="bellaLogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,800;1,800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #06060e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            gap: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .page-title {
            color: #a78bfa;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-align: center;
        }

        /* ── Controls ─────────────────────────────── */
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-photo    { background: #1e3a5f; color: #90cdf4; }
        .btn-removebg { background: #2d1b4e; color: #c4b5fd; display: none; }
        .btn-download { background: #064e3b; color: #6ee7b7; }
        .btn-close    { background: #1f2937; color: #9ca3af; }
        #photoInput   { display: none; }

        /* ── Poster wrapper (scales to fit screen) ── */
        .poster-wrapper {
            width: min(600px, 100vw - 32px);
            aspect-ratio: 600 / 900;
        }

        /* ── Fixed 600×900 poster canvas ─────────── */
        #poster {
            width: 600px;
            height: 900px;
            position: relative;
            overflow: hidden;
            background: #06060e;
            transform-origin: top left;
        }

        /* Dark arena bg */
        .arena-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 55%, #0e0e20 0%, #04040a 100%);
        }

        /* Team color glow — set via JS */
        .team-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        /* Lightning SVG */
        .lightning-layer {
            position: absolute;
            inset: 0;
            width: 600px;
            height: 900px;
            pointer-events: none;
            z-index: 3;
        }

        /* Player photo area */
        .photo-area {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: 155px;
            cursor: pointer;
            z-index: 5;
        }
        #playerPhoto {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center bottom;
            display: none;
        }
        .photo-hint {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px;
            border: 2px dashed rgba(255,255,255,0.12);
        }
        .photo-hint .hint-icon { font-size: 3rem; }
        .photo-hint .hint-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.88rem; font-weight: 600;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        /* Gradient fades so photo blends with header + stats */
        .top-fade {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 230px;
            background: linear-gradient(to bottom, rgba(6,6,14,0.82) 0%, transparent 100%);
            z-index: 6;
            pointer-events: none;
        }
        .bottom-fade {
            position: absolute;
            bottom: 155px; left: 0; right: 0;
            height: 220px;
            background: linear-gradient(to bottom, transparent 0%, rgba(6,6,14,0.85) 80%, #06060e 100%);
            z-index: 6;
            pointer-events: none;
        }

        /* ── Header (overlaid on photo) ─────────── */
        .poster-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 200px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 14px 14px 0;
            z-index: 10;
        }

        /* Team logo block – left */
        .team-logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 115px;
            flex-shrink: 0;
        }
        .team-logo-main {
            width: 96px;
            height: 96px;
            object-fit: contain;
        }
        .team-name-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem; font-weight: 700;
            color: rgba(255,255,255,0.85);
            text-align: center;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-shadow: 0 2px 6px rgba(0,0,0,1);
            margin-top: 3px;
            line-height: 1.2;
            max-width: 110px;
        }

        /* Title block – center */
        .title-block {
            flex: 1;
            text-align: center;
            padding: 6px 6px 0;
        }
        .title-line1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #fff;
            line-height: 0.92;
            letter-spacing: 0.05em;
            text-shadow: 3px 4px 0 rgba(0,0,0,0.85), 0 0 24px rgba(255,255,255,0.15);
        }
        .title-line2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.3rem;
            color: #fff;
            line-height: 0.92;
            letter-spacing: 0.05em;
            text-shadow: 3px 4px 0 rgba(0,0,0,0.85), 0 0 18px rgba(255,255,255,0.1);
        }
        .title-sub {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.58rem; font-weight: 600;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* BV League logo – right */
        .bv-logo-block {
            width: 115px;
            flex-shrink: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }
        .bv-logo {
            width: 96px;
            height: 96px;
            object-fit: contain;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.8));
        }

        /* ── Name banner ─────────────────────────── */
        .name-banner {
            position: absolute;
            left: 0; right: 0;
            bottom: 155px;
            height: 96px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
        }
        /* Brush-stroke background via clip-path */
        .name-banner-bg {
            position: absolute;
            inset: 4px 0;
            clip-path: polygon(
                0% 20%,  1.5% 1%,  5% 9%,  10% 0%,
                90% 2%,  95% 10%, 98.5% 0%, 100% 18%,
                100% 80%, 98% 100%, 94% 89%, 88% 100%,
                12% 98%, 6% 100%,  2% 88%,  0% 82%
            );
        }
        .player-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: 4rem;
            color: #fff;
            text-align: center;
            letter-spacing: 0.04em;
            line-height: 1;
            position: relative;
            z-index: 2;
            text-shadow:
                3px 3px 0 rgba(0,0,0,0.75),
                -1px -1px 0 rgba(0,0,0,0.4),
                0 0 18px rgba(0,0,0,0.9);
            white-space: nowrap;
        }

        /* ── Stats bar ───────────────────────────── */
        .stats-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 155px;
            background: rgba(4,4,12,0.95);
            border-top: 2px solid rgba(255,255,255,0.08);
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 0 0 10px;
        }
        .stats-group {
            flex: 1;
            display: flex;
            align-items: stretch;
            height: 100%;
        }
        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 4px;
        }
        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0; top: 18%; height: 64%;
            width: 1px;
            background: rgba(255,255,255,0.12);
        }
        .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.8rem;
            line-height: 1;
            /* color set via JS with team color */
        }
        .stat-lbl {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem; font-weight: 700;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* Cafe Bara block – right side of stats */
        .cafe-bara-block {
            width: 88px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 0 10px;
            height: 100%;
            gap: 5px;
        }
        .cafe-logo {
            width: 56px; height: 56px;
            object-fit: contain;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.2);
        }
        .cafe-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem; font-weight: 700;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-align: center;
        }

        /* ── Overlays ────────────────────────────── */
        #downloadOverlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 999;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 12px;
            color: #a78bfa;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; letter-spacing: 0.1em;
        }
        #downloadOverlay.show { display: flex; }

        #processingOverlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(4,4,15,0.92);
            z-index: 999;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
        }
        #processingOverlay.show { display: flex; }
        .proc-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(139,92,246,0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .proc-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            color: #a78bfa; letter-spacing: 0.12em;
        }
        .proc-sub {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.78rem;
            color: rgba(167,139,250,0.45);
            letter-spacing: 0.06em;
            text-align: center; max-width: 260px;
            line-height: 1.5;
        }
        .proc-skip {
            margin-top: 6px;
            padding: 7px 20px;
            background: transparent;
            border: 1px solid rgba(139,92,246,0.35);
            border-radius: 6px;
            color: rgba(167,139,250,0.55);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.82rem; font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
        }
        .proc-skip:hover { border-color: rgba(139,92,246,0.7); color: #a78bfa; }

        #successToast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #064e3b;
            color: #6ee7b7;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 0.1em;
            padding: 14px 28px;
            border-radius: 10px;
            border: 1px solid rgba(110,231,183,0.3);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
            opacity: 0; white-space: nowrap;
        }
        #successToast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div class="page-title">🏆 Best Player Poster Generator</div>

<div class="controls">
    <button class="btn btn-photo" onclick="document.getElementById('photoInput').click()">📷 Upload Photo</button>
    <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto(event)">
    <button class="btn btn-removebg" id="removeBgBtn" onclick="runBackgroundRemoval()">✂️ Remove Background</button>
    <button class="btn btn-download" onclick="downloadPoster()">⬇ Download PNG</button>
    <button class="btn btn-close" onclick="window.close()">✕ Close</button>
</div>

<!-- ── Poster ──────────────────────────────────────────────────────── -->
<div class="poster-wrapper" id="posterWrapper">
<div id="poster">

    <div class="arena-bg"></div>
    <div class="team-glow" id="teamGlow"></div>

    <!-- Lightning SVG -->
    <svg class="lightning-layer" id="lightningLayer" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="lg" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
            </filter>
            <filter id="ls" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
            </filter>
        </defs>
        <!-- Glow layer (blurred wide) -->
        <g id="lgGlow" filter="url(#lg)" opacity="0.7"></g>
        <!-- Soft layer -->
        <g id="lgSoft" filter="url(#ls)" opacity="0.85"></g>
        <!-- Sharp layer (crisp edge) -->
        <g id="lgSharp" opacity="0.9"></g>
    </svg>

    <!-- Player photo -->
    <div class="photo-area" id="photoArea" onclick="document.getElementById('photoInput').click()">
        <div class="photo-hint" id="photoHint">
            <div class="hint-icon">📸</div>
            <div class="hint-text">Tap to add player photo</div>
        </div>
        <img id="playerPhoto" src="" alt="Player">
    </div>

    <!-- Gradient fades -->
    <div class="top-fade"></div>
    <div class="bottom-fade"></div>

    <!-- Header (overlaid) -->
    <div class="poster-header">
        <div class="team-logo-block" id="teamLogoBlock">
            <img class="team-logo-main" id="teamLogoImg" src="" alt="" onerror="this.style.display='none'">
            <div class="team-name-label" id="teamNameLabel"></div>
        </div>
        <div class="title-block">
            <div class="title-line1">BEST PLAYER</div>
            <div class="title-line2">OF THE GAME</div>
            <div class="title-sub">Bella Vista Basketball League</div>
        </div>
        <div class="bv-logo-block">
            <img class="bv-logo" src="logos/Bella Vista League Logo.jpeg" alt="BV" onerror="this.style.display='none'">
        </div>
    </div>

    <!-- Name banner -->
    <div class="name-banner" id="nameBanner">
        <div class="name-banner-bg" id="nameBannerBg"></div>
        <div class="player-name" id="posterName">PLAYER NAME</div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
        <div class="stats-group" id="statsBar"></div>
        <div class="cafe-bara-block">
            <img class="cafe-logo" src="logos/Cafe Bara.jpeg" alt="Cafe Bara" onerror="this.style.display='none'">
            <div class="cafe-name">Cafe Bara</div>
        </div>
    </div>

</div><!-- #poster -->
</div><!-- .poster-wrapper -->

<div id="downloadOverlay">
    <div style="font-size:2rem">⏳</div>
    <div>Generating poster...</div>
</div>

<div id="processingOverlay">
    <div class="proc-spinner"></div>
    <div class="proc-title">REMOVING BACKGROUND</div>
    <div class="proc-sub" id="procSubText">AI is processing the photo...<br>First time may take ~30 sec to load the model.</div>
    <button class="proc-skip" onclick="skipBgRemoval()">Skip — use original photo</button>
</div>

<div id="successToast">✅ Poster saved to your downloads!</div>

<script>
    // ── Team color map ───────────────────────────────────────────────────────
    const TEAM_COLOR_MAP = [
        { keys: ['blue', 'bella vista blue'],       color: '#1565c0' },
        { keys: ['black', 'hooper'],                color: '#2a2a4a' },
        { keys: ['gray', 'grey', 'wolf', 'wolves'], color: '#546e7a' },
        { keys: ['green', 'bull'],                  color: '#1b6e20' },
        { keys: ['orange', 'inferno'],              color: '#d84315' },
        { keys: ['purple', 'raven', 'porpol'],      color: '#6a1fc2' },
        { keys: ['red', 'blood'],                   color: '#b71c1c' },
        { keys: ['yellow', 'slash', 'gold'],        color: '#e6a800' },
        { keys: ['bara', 'cafe'],                   color: '#6d4c41' },
    ];

    function getTeamColor(teamName, logoPath) {
        const text = ((teamName || '') + ' ' + (logoPath || '')).toLowerCase();
        for (const t of TEAM_COLOR_MAP) {
            if (t.keys.some(k => text.includes(k))) return t.color;
        }
        return '#6a1fc2'; // default purple
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
    }

    // ── Apply team color to all accent elements ───────────────────────────
    function applyTeamColor(color) {
        const rgb = hexToRgb(color);
        // Radial glow behind player
        document.getElementById('teamGlow').style.background =
            `radial-gradient(ellipse 72% 62% at 50% 43%, rgba(${rgb},0.52) 0%, transparent 68%)`;
        // Name banner
        document.getElementById('nameBannerBg').style.background = color;
        document.getElementById('nameBannerBg').style.boxShadow = `0 0 30px rgba(${rgb},0.5)`;
        // Stat values color + glow
        document.querySelectorAll('.stat-val').forEach(el => {
            el.style.color = color;
            el.style.textShadow = `0 0 18px rgba(${rgb},0.7), 2px 2px 0 rgba(0,0,0,0.7)`;
        });
        // Team logo glow
        const logo = document.getElementById('teamLogoImg');
        logo.style.filter = `drop-shadow(0 0 16px rgba(${rgb},0.8)) drop-shadow(0 0 6px rgba(0,0,0,0.9))`;
        // Lightning
        buildLightning(color);
    }

    // ── Lightning builder ─────────────────────────────────────────────────
    // Pre-defined bolt paths radiating from center (~300, 420)
    const BOLT_PATHS = [
        // Up-center
        'M300,420 L282,340 L308,295 L286,205 L312,155 L290,65',
        // Up-left
        'M300,420 L255,355 L232,305 L198,218 L220,165 L180,78 L208,28',
        // Up-right
        'M300,420 L348,352 L368,298 L408,215 L382,158 L428,72',
        // Right
        'M300,420 L385,398 L435,376 L495,358 L548,342 L596,328',
        // Left
        'M300,420 L215,400 L163,382 L105,366 L52,350 L4,335',
        // Down-right
        'M300,420 L358,482 L405,525 L458,574 L512,608 L568,648',
        // Down-left
        'M300,420 L242,484 L196,528 L142,578 L88,614 L32,652',
        // Short accent – upper right branch
        'M330,310 L368,270 L348,228 L392,188',
        // Short accent – upper left branch
        'M270,295 L232,258 L252,214 L218,172',
        // Short accent – right branch
        'M420,380 L468,355 L510,340',
        // Short accent – left branch
        'M182,392 L134,368 L90,355',
    ];

    function buildLightning(color) {
        const glow  = document.getElementById('lgGlow');
        const soft  = document.getElementById('lgSoft');
        const sharp = document.getElementById('lgSharp');
        glow.innerHTML = soft.innerHTML = sharp.innerHTML = '';

        BOLT_PATHS.forEach((d, i) => {
            const isAccent = i >= 7;
            const mkPath = (w, parent) => {
                const p = document.createElementNS('http://www.w3.org/2000/svg','path');
                p.setAttribute('d', d);
                p.setAttribute('fill', 'none');
                p.setAttribute('stroke', color);
                p.setAttribute('stroke-width', String(w));
                p.setAttribute('stroke-linecap', 'round');
                p.setAttribute('stroke-linejoin', 'round');
                parent.appendChild(p);
            };
            mkPath(isAccent ? 5  : 10, glow);
            mkPath(isAccent ? 2  : 3,  soft);
            mkPath(isAccent ? 0.8: 1.2,sharp);
        });

        // Center spark burst
        const spark = document.createElementNS('http://www.w3.org/2000/svg','circle');
        spark.setAttribute('cx','300'); spark.setAttribute('cy','420');
        spark.setAttribute('r','18');
        spark.setAttribute('fill', color);
        spark.setAttribute('opacity','0.25');
        glow.appendChild(spark);
    }

    // ── Scale poster to fit wrapper ───────────────────────────────────────
    function scalePoster() {
        const wrapper = document.getElementById('posterWrapper');
        const poster  = document.getElementById('poster');
        const scale   = wrapper.offsetWidth / 600;
        poster.style.transform = `scale(${scale})`;
        wrapper.style.height   = (900 * scale) + 'px';
    }
    scalePoster();
    window.addEventListener('resize', scalePoster);

    // ── Load data from sessionStorage ────────────────────────────────────
    const raw = sessionStorage.getItem('posterData');
    if (raw) {
        try {
            const d = JSON.parse(raw);
            const color = getTeamColor(d.playerTeam, d.playerTeamLogo);

            // Player name (auto-shrink if long)
            const nameEl = document.getElementById('posterName');
            nameEl.textContent = (d.playerName || 'PLAYER NAME').toUpperCase();

            // Team logo + label
            if (d.playerTeamLogo) {
                document.getElementById('teamLogoImg').src = d.playerTeamLogo;
            }
            document.getElementById('teamNameLabel').textContent = (d.playerTeam || '').toUpperCase();

            // Stats — only show non-zero
            if (d.stats) {
                const allStats = [
                    { val: d.stats.points   ?? 0, lbl: 'PTS'   },
                    { val: d.stats.rebounds ?? 0, lbl: 'REBS'  },
                    { val: d.stats.assists  ?? 0, lbl: 'AST'   },
                    { val: d.stats.steals   ?? 0, lbl: 'STL'   },
                    { val: d.stats.blocks   ?? 0, lbl: 'BLK'   },
                ];
                const bar = document.getElementById('statsBar');
                bar.innerHTML = '';
                allStats.filter(s => s.val > 0).forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'stat-item';
                    el.innerHTML =
                        `<div class="stat-val">${s.val}</div>` +
                        `<div class="stat-lbl">${s.lbl}</div>`;
                    bar.appendChild(el);
                });
            }

            // Matchup / date info (optional sub-label under name)
            // Apply team color AFTER stats are built so stat-val elements exist
            applyTeamColor(color);

            // Date info
            if (d.gameDate) {
                const dateStr = new Date(d.gameDate + 'T00:00:00')
                    .toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
                document.querySelector('.title-sub').textContent =
                    `Bella Vista Basketball League  ·  ${dateStr}`;
            }

            // Auto-shrink player name to fit banner width
            requestAnimationFrame(() => {
                const scale  = parseFloat(document.getElementById('poster').style.transform.replace('scale(','')) || 1;
                const maxPx  = 560;
                let fs = 64;
                nameEl.style.fontSize = fs + 'px';
                while (nameEl.scrollWidth > maxPx && fs > 22) {
                    fs -= 2;
                    nameEl.style.fontSize = fs + 'px';
                }
            });

        } catch(e) { console.error('poster data error', e); }
    } else {
        // No data — still apply default colors
        applyTeamColor('#6a1fc2');
    }

    // ── Photo upload ─────────────────────────────────────────────────────
    let _lastUploadedFile    = null;
    let _lastUploadedDataUrl = null;

    function applyPhotoToCard(dataUrl) {
        const img = document.getElementById('playerPhoto');
        img.src = dataUrl;
        img.style.display = 'block';
        document.getElementById('photoHint').style.display = 'none';
        document.getElementById('photoArea').style.cursor  = 'default';
        document.getElementById('photoArea').onclick       = null;
    }

    function loadPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        _lastUploadedFile = file;                    // keep original File for bg removal
        const reader = new FileReader();
        reader.onload = e => {
            _lastUploadedDataUrl = e.target.result;
            applyPhotoToCard(e.target.result);
            document.getElementById('removeBgBtn').style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
    }

    // ── Background removal (optional, on-demand) ─────────────────────────
    function skipBgRemoval() {
        document.getElementById('processingOverlay').classList.remove('show');
    }

    async function runBackgroundRemoval() {
        if (!_lastUploadedFile && !_lastUploadedDataUrl) return;
        const overlay = document.getElementById('processingOverlay');
        const subText = document.getElementById('procSubText');
        subText.innerHTML = 'Loading AI model...<br>First time may take ~30 sec.';
        overlay.classList.add('show');

        try {
            // Use original File (Blob subtype) directly — avoids fetch(data:) failures
            const inputBlob = _lastUploadedFile || dataUrlToBlob(_lastUploadedDataUrl);

            const { removeBackground } = await import(
                'https://staticimgly.com/@imgly/background-removal/1.4.5/dist/browser/index.mjs'
            );
            subText.innerHTML = 'Cutting out player...';
            const resultBlob = await removeBackground(inputBlob, {
                publicPath: 'https://staticimgly.com/@imgly/background-removal/1.4.5/dist/browser/',
                model: 'small',
                output: { format: 'image/png', quality: 1 }
            });

            const reader = new FileReader();
            reader.onload = e => {
                overlay.classList.remove('show');
                applyPhotoToCard(e.target.result);
                document.getElementById('removeBgBtn').style.display = 'none';
            };
            reader.readAsDataURL(resultBlob);
        } catch(e) {
            console.error('BG removal error:', e);
            overlay.classList.remove('show');
            alert(
                'Background removal could not run on this device.\n\n' +
                'Easy workaround:\n' +
                '1. Open remove.bg in your browser\n' +
                '2. Upload the player photo there\n' +
                '3. Download the cutout PNG\n' +
                '4. Upload that cutout here instead'
            );
        }
    }

    // Convert data URL → Blob without Fetch API (works on all browsers)
    function dataUrlToBlob(dataUrl) {
        const [header, data] = dataUrl.split(',');
        const mime   = header.match(/:(.*?);/)[1];
        const bytes  = atob(data);
        const buffer = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) buffer[i] = bytes.charCodeAt(i);
        return new Blob([buffer], { type: mime });
    }

    // ── Download poster as PNG ────────────────────────────────────────────
    async function downloadPoster() {
        const overlay = document.getElementById('downloadOverlay');
        overlay.classList.add('show');

        const poster  = document.getElementById('poster');
        const prev    = poster.style.transform;
        poster.style.transform = 'scale(1)';
        document.getElementById('posterWrapper').style.height = '900px';

        try {
            const canvas = await html2canvas(poster, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#06060e',
                logging: false
            });

            const name  = document.getElementById('posterName').textContent || 'BestPlayer';
            const link  = document.createElement('a');
            link.download = `BestPlayer_${name.replace(/\s+/g,'_')}.png`;
            link.href     = canvas.toDataURL('image/png');
            link.click();

            const toast = document.getElementById('successToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        } catch(e) {
            alert('Download failed: ' + e.message);
        } finally {
            poster.style.transform = prev;
            scalePoster();
            overlay.classList.remove('show');
        }
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('✅ SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
    }
</script>
