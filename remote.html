<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Timer Control</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#48bb78">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BV Tracker">
    <link rel="apple-touch-icon" href="bellaLogo.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f1419;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a202c;
            border-radius: 10px;
            padding: 10px 14px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: #63b3ed;
        }
        .status { font-size: 0.78rem; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
        .status.connected    { color: #68d391; }
        .status.disconnected { color: #fc8181; background: rgba(252,129,129,0.12); }
        .status.connecting   { color: #f6ad55; }

        /* ── Timer display bar ── */
        .timers-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-shrink: 0;
        }
        .timer-display-box {
            background: #1a202c;
            border-radius: 10px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #2d3748;
            transition: border-color 0.3s;
        }
        .timer-display-box.running { border-color: #68d391; }
        .timer-display-box.warning { border-color: #f6ad55; }
        .timer-display-box.danger  { border-color: #fc8181; }
        .timer-display-label {
            font-size: 0.62rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .timer-display-value {
            font-size: 1.9rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .timer-display-value.running { color: #68d391; }
        .timer-display-value.warning { color: #f6ad55; }
        .timer-display-value.danger  { color: #fc8181; }
        .timer-display-value.stopped { color: #e2e8f0; }

        /* ── Score section (gets all remaining space) ── */
        .score-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex: 1;
            min-height: 0;
        }
        .score-team-box {
            background: #1a202c;
            border-radius: 12px;
            padding: 10px 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-height: 0;
        }
        .score-team-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            flex-shrink: 0;
        }
        .score-team-value {
            font-size: 2.6rem;
            font-weight: 900;
            color: #f6e05e;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .score-tracker-ref {
            font-size: 0.68rem;
            font-weight: 700;
            color: #4a5568;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            line-height: 1;
        }
        .score-tracker-ref.mismatch {
            color: #fc8181;
        }
        .score-btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
            flex: 1;
            min-height: 0;
        }
        .score-btn-grid .ctrl-btn {
            height: 100%;
            font-size: 1.3rem;
            border-radius: 10px;
        }

        /* ── Timer controls (two rows) ── */
        .timer-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .timer-row {
            display: flex;
            gap: 8px;
        }
        .timer-row .ctrl-btn {
            flex: 1;
            padding: 13px 4px;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        /* ── Buzzer ── */
        .buzzer-row { flex-shrink: 0; }
        .buzzer-row .ctrl-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.05rem;
            border-radius: 10px;
        }
        .btn-buzzer.active {
            background: #e53e3e !important;
            transform: scale(0.97);
        }

        /* ── Flash feedback ── */
        .sent-flash {
            text-align: center;
            font-size: 0.78rem;
            height: 16px;
            color: #68d391;
            opacity: 0;
            transition: opacity 0.3s;
            flex-shrink: 0;
        }

        /* ── Base button styles ── */
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.1s, transform 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            /* Prevent long-press copy/select popup on mobile */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .ctrl-btn:active { opacity: 0.7; transform: scale(0.96); }

        .btn-start      { background: #38a169; color: white; }
        .btn-pause      { background: #d69e2e; color: white; }
        .btn-reset      { background: #3182ce; color: white; }
        .btn-reset14    { background: #805ad5; color: white; }
        .btn-adjust     { background: #2d3748; color: #e2e8f0; border: 2px solid #4a5568; }
        .btn-buzzer     { background: #c05621; color: white; }
        .btn-danger     { background: #742a2a; color: #fc8181; border: 2px solid #fc8181; }
        .btn-toggle     { background: #2d3748; color: #a0aec0; border: 2px solid #4a5568; flex: 0 0 44px !important; font-size: 1rem; }
        .btn-toggle.active { color: #f6ad55; border-color: #f6ad55; }
        .btn-score-add  { background: #2b6cb0; color: white; }
        .btn-score-undo { background: #744210; color: white; }

        /* ── Adjust panel (hidden by default) ── */
        .adjust-panel {
            display: none;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .adjust-panel.open { display: flex; }
        .adjust-row {
            display: flex;
            gap: 6px;
        }
        .adjust-label {
            font-size: 0.6rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 2px;
        }
        .adjust-row .ctrl-btn {
            flex: 1;
            padding: 12px 4px;
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>⏱ Remote Control</h1>
        <div class="status connecting" id="statusMsg" onclick="manualReconnect()" title="Tap to reconnect">Connecting...</div>
    </div>

    <!-- Timer display bar -->
    <div class="timers-display">
        <div class="timer-display-box" id="gameTimerBox">
            <div>
                <div class="timer-display-label">Game Time</div>
                <div class="timer-display-value stopped" id="gameTimerVal">--:--</div>
            </div>
        </div>
        <div class="timer-display-box" id="shotClockBox">
            <div>
                <div class="timer-display-label">Shot Clock</div>
                <div class="timer-display-value stopped" id="shotClockVal">--</div>
            </div>
        </div>
    </div>

    <!-- Scores (largest section) -->
    <div class="score-section">
        <div class="score-team-box">
            <div class="score-team-name" id="team1Name">Team 1</div>
            <div class="score-team-value" id="team1ScoreDisplay">0</div>
            <div class="score-tracker-ref" id="team1TrackerRef">Tracker: 0</div>
            <div class="score-btn-grid">
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 3)">+3</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 2)">+2</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 1)">+1</button>
                <button class="ctrl-btn btn-score-undo" onclick="addScore('team1', -1)">−1</button>
            </div>
        </div>
        <div class="score-team-box">
            <div class="score-team-name" id="team2Name">Team 2</div>
            <div class="score-team-value" id="team2ScoreDisplay">0</div>
            <div class="score-tracker-ref" id="team2TrackerRef">Tracker: 0</div>
            <div class="score-btn-grid">
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 3)">+3</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 2)">+2</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 1)">+1</button>
                <button class="ctrl-btn btn-score-undo" onclick="addScore('team2', -1)">−1</button>
            </div>
        </div>
    </div>

    <!-- Timer controls: row 1 — start/pause toggles + adjust -->
    <div class="timer-controls">
        <div class="timer-row">
            <button class="ctrl-btn btn-start" id="gameTimerToggleBtn" onclick="toggleGameTimer()">▶ Game</button>
            <button class="ctrl-btn btn-start" id="shotClockToggleBtn" onclick="toggleShotClock()">▶ Clock</button>
            <button class="ctrl-btn btn-toggle" id="adjustToggleBtn" onclick="toggleAdjust()">⚙</button>
        </div>
        <!-- row 2 — shot clock resets -->
        <div class="timer-row">
            <button class="ctrl-btn btn-reset"   onclick="sendCommand('shotClock', 'reset24')">↺ 24s</button>
            <button class="ctrl-btn btn-reset14" onclick="sendCommand('shotClock', 'reset14')">↺ 14s</button>
        </div>
    </div>

    <!-- Collapsible adjust panel -->
    <div class="adjust-panel" id="adjustPanel">
        <div class="adjust-label">🕐 Game Timer</div>
        <div class="adjust-row">
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', -60)">− 1min</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', +60)">+ 1min</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', -1)">− 1s</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', +1)">+ 1s</button>
        </div>
        <div class="adjust-label">🏀 Shot Clock</div>
        <div class="adjust-row">
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('shotClock', -1)">− 1s</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('shotClock', +1)">+ 1s</button>
        </div>
        <div class="adjust-label" style="color: #fc8181; margin-top: 4px;">🔄 New Game</div>
        <div class="adjust-row">
            <button class="ctrl-btn btn-danger" onclick="resetAll()">Reset Scores + Timers</button>
        </div>
    </div>

    <!-- Buzzer — oncontextmenu blocks the long-press copy popup -->
    <div class="buzzer-row">
        <button class="ctrl-btn btn-buzzer" id="buzzerBtn"
            oncontextmenu="return false"
            onmousedown="buzzerStart(event)" onmouseup="buzzerStop()"
            onmouseleave="buzzerStop()"
            ontouchstart="buzzerStart(event)" ontouchend="buzzerStop()"
            ontouchcancel="buzzerStop()">
            📢 HOLD FOR BUZZER
        </button>
    </div>

    <div class="sent-flash" id="sentFlash"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRjX0GdMHSNeykGuxclCgSc3XpY04-oEE",
            authDomain: "bella-vista-league-live-score.firebaseapp.com",
            databaseURL: "https://bella-vista-league-live-score-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bella-vista-league-live-score",
            storageBucket: "bella-vista-league-live-score.firebasestorage.app",
            messagingSenderId: "563016772281",
            appId: "1:563016772281:web:e2c3b5d3a08c2bc9308968"
        };

        // Guard against "already exists" when page is cached (common on iOS Safari refresh)
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            if (!/already exists/i.test(e.message)) console.error('Firebase init error:', e);
        }
        const database = firebase.database();

        const statusEl        = document.getElementById('statusMsg');
        const gameTimerVal    = document.getElementById('gameTimerVal');
        const gameTimerBox    = document.getElementById('gameTimerBox');
        const shotClockVal    = document.getElementById('shotClockVal');
        const shotClockBox    = document.getElementById('shotClockBox');
        const sentFlash       = document.getElementById('sentFlash');
        const gameTimerToggle = document.getElementById('gameTimerToggleBtn');
        const shotClockToggle = document.getElementById('shotClockToggleBtn');
        const team1NameEl     = document.getElementById('team1Name');
        const team2NameEl     = document.getElementById('team2Name');
        const team1ScoreEl    = document.getElementById('team1ScoreDisplay');
        const team2ScoreEl    = document.getElementById('team2ScoreDisplay');
        const team1TrackerRef = document.getElementById('team1TrackerRef');
        const team2TrackerRef = document.getElementById('team2TrackerRef');
        const buzzerBtn       = document.getElementById('buzzerBtn');

        let gameTimerRunning = false;
        let shotClockRunning = false;

        // ── Client-side interpolation ────────────────────────────────────────
        // Firebase pushes every 2s. Between pushes we tick locally so the
        // display is smooth instead of freezing then jumping.
        let _gtInterval  = null; // game timer local tick
        let _scInterval  = null; // shot clock local tick

        function _updateGameTimerDisplay(secs, running) {
            const mins = Math.floor(secs / 60);
            const s    = secs % 60;
            gameTimerVal.textContent = `${mins}:${s.toString().padStart(2, '0')}`;
            gameTimerVal.className   = 'timer-display-value ' + (running ? 'running' : 'stopped');
            gameTimerBox.className   = 'timer-display-box'    + (running ? ' running' : '');
            gameTimerToggle.textContent = running ? '⏸ Pause' : '▶ Start';
            gameTimerToggle.className   = 'ctrl-btn ' + (running ? 'btn-pause' : 'btn-start');
        }

        function _updateShotClockDisplay(sc, running) {
            shotClockVal.textContent = sc;
            let colorClass = 'stopped', boxClass = '';
            if (running) {
                if (sc <= 5)       { colorClass = 'danger';  boxClass = 'danger'; }
                else if (sc <= 10) { colorClass = 'warning'; boxClass = 'warning'; }
                else               { colorClass = 'running'; boxClass = 'running'; }
            }
            shotClockVal.className = 'timer-display-value ' + colorClass;
            shotClockBox.className = 'timer-display-box'    + (boxClass ? ' ' + boxClass : '');
            shotClockToggle.textContent = running ? '⏸ Clock' : '▶ Clock';
            shotClockToggle.className   = 'ctrl-btn ' + (running ? 'btn-pause' : 'btn-start');
        }

        function syncGameTimer(seconds, running, lastUpdated) {
            const elapsed = lastUpdated ? Math.max(0, Math.floor((Date.now() - lastUpdated) / 1000)) : 0;
            const expected = Math.max(0, seconds - elapsed);

            // Don't restart the local interval if we're already running and in sync (±1s).
            // Restarting every Firebase push (every ~2s) resets the tick phase and causes
            // the display to visibly freeze for up to 1s — the "jump to catch up" the user sees.
            if (running && _gtInterval !== null && expected >= 1) {
                const parts = gameTimerVal.textContent.split(':');
                const shown = parts.length === 2 ? parseInt(parts[0]) * 60 + parseInt(parts[1]) : 0;
                if (shown === expected) return; // exact match — leave interval alone
            }

            if (_gtInterval) { clearInterval(_gtInterval); _gtInterval = null; }
            let display = expected;
            _updateGameTimerDisplay(display, running);
            if (!running || display <= 0) return;
            _gtInterval = setInterval(() => {
                display = Math.max(0, display - 1);
                _updateGameTimerDisplay(display, true);
                if (display <= 0) { clearInterval(_gtInterval); _gtInterval = null; }
            }, 1000);
        }

        function syncShotClock(seconds, running, lastUpdated) {
            const elapsed = lastUpdated ? Math.max(0, Math.floor((Date.now() - lastUpdated) / 1000)) : 0;
            const expected = Math.max(0, seconds - elapsed);

            // Same smooth-resync guard: if already running and within 1s, don't restart.
            // A divergence of 2+ seconds means a reset/manual adjustment happened → full resync.
            if (running && _scInterval !== null && expected >= 1) {
                const shown = parseInt(shotClockVal.textContent) || 0;
                if (shown === expected) return; // exact match — leave interval alone
            }

            if (_scInterval) { clearInterval(_scInterval); _scInterval = null; }
            let display = expected;
            _updateShotClockDisplay(display, running);
            if (!running || display <= 0) return;
            _scInterval = setInterval(() => {
                display = Math.max(0, display - 1);
                _updateShotClockDisplay(display, running);
                if (display <= 0) { clearInterval(_scInterval); _scInterval = null; }
            }, 1000);
        }

        // ── Connection monitoring & auto-reconnect ──────────────────────────
        let disconnectTimer  = null;
        let isConnected      = false;

        database.ref('.info/connected').on('value', (snap) => {
            isConnected = !!snap.val();
            clearTimeout(disconnectTimer);

            if (isConnected) {
                statusEl.textContent = '● Connected';
                statusEl.className   = 'status connected';
            } else {
                statusEl.textContent = '● Disconnected — tap to reconnect';
                statusEl.className   = 'status disconnected';

                // Stage 1 — nudge the SDK after 8 s
                disconnectTimer = setTimeout(() => {
                    database.goOnline();

                    // Stage 2 — force a full cycle after another 15 s
                    disconnectTimer = setTimeout(() => {
                        database.goOffline();
                        setTimeout(() => database.goOnline(), 600);

                        // Stage 3 — reload the page after another 30 s if still stuck
                        disconnectTimer = setTimeout(() => {
                            if (!document.hidden && !isConnected) {
                                location.reload();
                            }
                        }, 30000);
                    }, 15000);
                }, 8000);
            }
        });

        // Re-establish when the page comes back into view or network comes back
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) database.goOnline();
        });
        window.addEventListener('online', () => database.goOnline());

        function manualReconnect() {
            clearTimeout(disconnectTimer);
            statusEl.textContent = '↺ Reconnecting...';
            statusEl.className   = 'status connecting';
            database.goOffline();
            setTimeout(() => database.goOnline(), 600);
        }

        // ── Live sync ───────────────────────────────────────────────────────
        database.ref('liveGame').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                gameTimerVal.textContent = '--:--';
                shotClockVal.textContent = '--';
                return;
            }

            // Team names & scores
            if (data.team1) team1NameEl.textContent = data.team1.name || 'Team 1';
            if (data.team2) team2NameEl.textContent = data.team2.name || 'Team 2';

            const cast1 = data.team1Score ?? 0;
            const cast2 = data.team2Score ?? 0;
            const master1 = data.team1TrackerScore ?? 0;
            const master2 = data.team2TrackerScore ?? 0;

            team1ScoreEl.textContent = cast1;
            team2ScoreEl.textContent = cast2;

            // Tracker reference — red warning when cast view is out of sync with master
            team1TrackerRef.textContent = 'Tracker: ' + master1;
            team1TrackerRef.className = 'score-tracker-ref' + (cast1 !== master1 ? ' mismatch' : '');
            team2TrackerRef.textContent = 'Tracker: ' + master2;
            team2TrackerRef.className = 'score-tracker-ref' + (cast2 !== master2 ? ' mismatch' : '');

            if (data.gameTimer) {
                gameTimerRunning = !!data.gameTimer.isRunning;
                syncGameTimer(data.gameTimer.currentSeconds || 0, gameTimerRunning, data.lastUpdated);
            }

            if (data.shotClock) {
                shotClockRunning = !!data.shotClock.isRunning;
                syncShotClock(data.shotClock.seconds || 0, shotClockRunning, data.lastUpdated);
            }
        });

        // ── Controls ────────────────────────────────────────────────────────
        function toggleGameTimer() {
            sendCommand('gameTimer', gameTimerRunning ? 'pause' : 'start');
        }

        function toggleShotClock() {
            sendCommand('shotClock', shotClockRunning ? 'pause' : 'start');
        }

        function toggleAdjust() {
            const panel = document.getElementById('adjustPanel');
            const btn   = document.getElementById('adjustToggleBtn');
            const open  = panel.classList.toggle('open');
            btn.classList.toggle('active', open);
        }

        async function resetAll() {
            if (!confirm('Reset scores, game timer and shot clock for a new game?')) return;
            try {
                const t = Date.now();
                await database.ref('timerCommands').set({ target: 'team1',     command: 'scoreReset', timestamp: t     });
                await database.ref('timerCommands').set({ target: 'team2',     command: 'scoreReset', timestamp: t + 1 });
                await database.ref('timerCommands').set({ target: 'gameTimer', command: 'reset',      timestamp: t + 2 });
                await database.ref('timerCommands').set({ target: 'shotClock', command: 'reset24',    timestamp: t + 3 });
                // Explicitly pause both timers — shot clock auto-starts on reset during play,
                // but for a new game we want everything stopped and ready.
                await database.ref('timerCommands').set({ target: 'gameTimer', command: 'pause',      timestamp: t + 4 });
                await database.ref('timerCommands').set({ target: 'shotClock', command: 'pause',      timestamp: t + 5 });
                showFlash('✓ Reset — ready for new game');
            } catch {
                showFlash('✗ Reset failed — check connection');
            }
        }

        function sendAdjust(target, amount) {
            database.ref('timerCommands').set({
                target,
                command: 'adjust',
                amount,
                timestamp: Date.now()
            }).then(() => {
                const sign  = amount > 0 ? '+' : '';
                const label = target === 'gameTimer'
                    ? (Math.abs(amount) >= 60 ? `Game Timer ${sign}${amount / 60}min` : `Game Timer ${sign}${amount}s`)
                    : `Shot Clock ${sign}${amount}s`;
                showFlash(`✓ ${label}`);
            }).catch(() => showFlash('✗ Failed — tap status bar to reconnect'));
        }

        function addScore(team, amount) {
            database.ref('timerCommands').set({
                target: team,
                command: 'scoreAdd',
                amount,
                timestamp: Date.now()
            }).then(() => {
                const teamName = team === 'team1'
                    ? (team1NameEl.textContent || 'Team 1')
                    : (team2NameEl.textContent || 'Team 2');
                const sign = amount > 0 ? '+' : '';
                showFlash(`✓ ${sign}${amount} — ${teamName}`);
            }).catch(() => showFlash('✗ Failed — tap status bar to reconnect'));
        }

        function sendCommand(target, command) {
            database.ref('timerCommands').set({
                target,
                command,
                timestamp: Date.now()
            }).then(() => {
                const label = target === 'gameTimer' ? 'Game Timer' : 'Shot Clock';
                showFlash(`✓ ${command.replace('24', ' 24s').replace('14', ' 14s')} — ${label}`);
            }).catch(() => showFlash('✗ Failed — tap status bar to reconnect'));
        }

        let flashTimer = null;
        function showFlash(msg) {
            const isError = msg.startsWith('✗');
            sentFlash.textContent = msg;
            sentFlash.style.color  = isError ? '#fc8181' : '#68d391';
            sentFlash.style.opacity = '1';
            clearTimeout(flashTimer);
            flashTimer = setTimeout(() => { sentFlash.style.opacity = '0'; }, isError ? 3000 : 1800);
        }

        // ── Buzzer ──────────────────────────────────────────────────────────
        // Uses a dedicated `buzzerState` path (a flag, not a command) so the
        // tracker always reflects current state. onDisconnect auto-stops if the
        // remote crashes or loses connection while the button is held.
        let buzzerActive = false;
        const buzzerRef = database.ref('buzzerState');

        function buzzerStart(e) {
            if (e && e.cancelable) e.preventDefault();
            if (buzzerActive) return;
            buzzerActive = true;
            buzzerBtn.classList.add('active');

            // Server auto-stops if remote disconnects while button is held
            buzzerRef.onDisconnect().set({ active: false, timestamp: 0 });
            buzzerRef.set({ active: true, timestamp: Date.now() }).catch(() => {
                buzzerActive = false;
                buzzerBtn.classList.remove('active');
                showFlash('✗ Buzzer failed — tap status bar to reconnect');
            });
        }

        function buzzerStop() {
            if (!buzzerActive) return;
            buzzerActive = false;
            buzzerBtn.classList.remove('active');

            // Cancel the server-side auto-stop (we're stopping manually)
            buzzerRef.onDisconnect().cancel();
            buzzerRef.set({ active: false, timestamp: Date.now() }).catch(() => {
                // Retry once — stopping is critical
                setTimeout(() => {
                    buzzerRef.set({ active: false, timestamp: Date.now() })
                        .catch(() => showFlash('✗ Buzzer stop failed — reconnect needed'));
                }, 800);
            });
        }

        // Safety net: stop buzzer if page loses focus (prevents buzzer stuck on)
        document.addEventListener('visibilitychange', () => { if (document.hidden) buzzerStop(); });
        window.addEventListener('blur', buzzerStop);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => {
                    console.log('✅ SW registered:', reg.scope);
                    reg.addEventListener('updatefound', () => {
                        const newSW = reg.installing;
                        newSW.addEventListener('statechange', () => {
                            if (newSW.state === 'activated') {
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
