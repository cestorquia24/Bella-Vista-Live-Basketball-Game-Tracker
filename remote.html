<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Timer Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f1419;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a202c;
            border-radius: 10px;
            padding: 10px 14px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 700;
            color: #63b3ed;
        }
        .status { font-size: 0.78rem; font-weight: 600; }
        .status.connected    { color: #68d391; }
        .status.disconnected { color: #fc8181; }
        .status.connecting   { color: #f6ad55; }

        /* ── Timer display bar ── */
        .timers-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-shrink: 0;
        }
        .timer-display-box {
            background: #1a202c;
            border-radius: 10px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #2d3748;
            transition: border-color 0.3s;
        }
        .timer-display-box.running { border-color: #68d391; }
        .timer-display-box.warning { border-color: #f6ad55; }
        .timer-display-box.danger  { border-color: #fc8181; }
        .timer-display-label {
            font-size: 0.62rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .timer-display-value {
            font-size: 1.9rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .timer-display-value.running { color: #68d391; }
        .timer-display-value.warning { color: #f6ad55; }
        .timer-display-value.danger  { color: #fc8181; }
        .timer-display-value.stopped { color: #e2e8f0; }

        /* ── Score section (gets all remaining space) ── */
        .score-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex: 1;
            min-height: 0;
        }
        .score-team-box {
            background: #1a202c;
            border-radius: 12px;
            padding: 10px 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-height: 0;
        }
        .score-team-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            flex-shrink: 0;
        }
        .score-team-value {
            font-size: 3.2rem;
            font-weight: 900;
            color: #f6e05e;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .score-btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
            flex: 1;
            min-height: 0;
        }
        .score-btn-grid .ctrl-btn {
            height: 100%;
            font-size: 1.3rem;
            border-radius: 10px;
        }

        /* ── Timer controls row ── */
        .timer-controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .timer-controls .ctrl-btn {
            flex: 1;
            padding: 16px 6px;
            font-size: 0.92rem;
            border-radius: 10px;
        }

        /* ── Buzzer ── */
        .buzzer-row { flex-shrink: 0; }
        .buzzer-row .ctrl-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.05rem;
            border-radius: 10px;
        }

        /* ── Flash feedback ── */
        .sent-flash {
            text-align: center;
            font-size: 0.78rem;
            height: 16px;
            color: #68d391;
            opacity: 0;
            transition: opacity 0.3s;
            flex-shrink: 0;
        }

        /* ── Base button styles ── */
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.1s, transform 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { opacity: 0.7; transform: scale(0.96); }

        .btn-start      { background: #38a169; color: white; }
        .btn-pause      { background: #d69e2e; color: white; }
        .btn-reset      { background: #3182ce; color: white; }
        .btn-reset14    { background: #805ad5; color: white; }
        .btn-adjust     { background: #2d3748; color: #e2e8f0; border: 2px solid #4a5568; }
        .btn-toggle     { background: #2d3748; color: #a0aec0; border: 2px solid #4a5568; flex: 0 0 44px !important; font-size: 1rem; }
        .btn-toggle.active { color: #f6ad55; border-color: #f6ad55; }

        /* ── Adjust panel (hidden by default) ── */
        .adjust-panel {
            display: none;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .adjust-panel.open { display: flex; }
        .adjust-row {
            display: flex;
            gap: 6px;
        }
        .adjust-label {
            font-size: 0.6rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 2px;
        }
        .adjust-row .ctrl-btn {
            flex: 1;
            padding: 12px 4px;
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>⏱ Remote Control</h1>
        <div class="status connecting" id="statusMsg">Connecting...</div>
    </div>

    <!-- Timer display bar -->
    <div class="timers-display">
        <div class="timer-display-box" id="gameTimerBox">
            <div>
                <div class="timer-display-label">Game Time</div>
                <div class="timer-display-value stopped" id="gameTimerVal">--:--</div>
            </div>
        </div>
        <div class="timer-display-box" id="shotClockBox">
            <div>
                <div class="timer-display-label">Shot Clock</div>
                <div class="timer-display-value stopped" id="shotClockVal">--</div>
            </div>
        </div>
    </div>

    <!-- Scores (largest section) -->
    <div class="score-section">
        <div class="score-team-box">
            <div class="score-team-name" id="team1Name">Team 1</div>
            <div class="score-team-value" id="team1ScoreDisplay">0</div>
            <div class="score-btn-grid">
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 3)">+3</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 2)">+2</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team1', 1)">+1</button>
                <button class="ctrl-btn btn-score-undo" onclick="addScore('team1', -1)">−1</button>
            </div>
        </div>
        <div class="score-team-box">
            <div class="score-team-name" id="team2Name">Team 2</div>
            <div class="score-team-value" id="team2ScoreDisplay">0</div>
            <div class="score-btn-grid">
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 3)">+3</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 2)">+2</button>
                <button class="ctrl-btn btn-score-add"  onclick="addScore('team2', 1)">+1</button>
                <button class="ctrl-btn btn-score-undo" onclick="addScore('team2', -1)">−1</button>
            </div>
        </div>
    </div>

    <!-- Timer controls: Start/Pause + Reset 24s + Reset 14s -->
    <div class="timer-controls">
        <button class="ctrl-btn btn-start" id="gameTimerToggleBtn" onclick="toggleGameTimer()">▶ Start</button>
        <button class="ctrl-btn btn-reset"   onclick="sendCommand('shotClock', 'reset24')">↺ 24s</button>
        <button class="ctrl-btn btn-reset14" onclick="sendCommand('shotClock', 'reset14')">↺ 14s</button>
        <button class="ctrl-btn btn-toggle" id="adjustToggleBtn" onclick="toggleAdjust()">⚙</button>
    </div>

    <!-- Collapsible adjust panel -->
    <div class="adjust-panel" id="adjustPanel">
        <div class="adjust-label">🕐 Game Timer</div>
        <div class="adjust-row">
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', -60)">− 1min</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', +60)">+ 1min</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', -1)">− 1s</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('gameTimer', +1)">+ 1s</button>
        </div>
        <div class="adjust-label">🏀 Shot Clock</div>
        <div class="adjust-row">
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('shotClock', -1)">− 1s</button>
            <button class="ctrl-btn btn-adjust" onclick="sendAdjust('shotClock', +1)">+ 1s</button>
        </div>
    </div>

    <!-- Buzzer -->
    <div class="buzzer-row">
        <button class="ctrl-btn btn-buzzer"
            onmousedown="buzzerStart()" onmouseup="buzzerStop()"
            onmouseleave="buzzerStop()" ontouchstart="buzzerStart()"
            ontouchend="buzzerStop()">
            📢 HOLD FOR BUZZER
        </button>
    </div>

    <div class="sent-flash" id="sentFlash"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRjX0GdMHSNeykGuxclCgSc3XpY04-oEE",
            authDomain: "bella-vista-league-live-score.firebaseapp.com",
            databaseURL: "https://bella-vista-league-live-score-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bella-vista-league-live-score",
            storageBucket: "bella-vista-league-live-score.firebasestorage.app",
            messagingSenderId: "563016772281",
            appId: "1:563016772281:web:e2c3b5d3a08c2bc9308968"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const statusEl        = document.getElementById('statusMsg');
        const gameTimerVal    = document.getElementById('gameTimerVal');
        const gameTimerBox    = document.getElementById('gameTimerBox');
        const shotClockVal    = document.getElementById('shotClockVal');
        const shotClockBox    = document.getElementById('shotClockBox');
        const sentFlash       = document.getElementById('sentFlash');
        const gameTimerToggle = document.getElementById('gameTimerToggleBtn');
        const team1NameEl     = document.getElementById('team1Name');
        const team2NameEl     = document.getElementById('team2Name');
        const team1ScoreEl    = document.getElementById('team1ScoreDisplay');
        const team2ScoreEl    = document.getElementById('team2ScoreDisplay');

        let gameTimerRunning = false;

        // Connection status
        database.ref('.info/connected').on('value', (snap) => {
            if (snap.val()) {
                statusEl.textContent = '● Connected';
                statusEl.className = 'status connected';
            } else {
                statusEl.textContent = '● Disconnected — retrying...';
                statusEl.className = 'status disconnected';
            }
        });

        // Live sync
        database.ref('liveGame').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                gameTimerVal.textContent = '--:--';
                shotClockVal.textContent = '--';
                return;
            }

            // Team names & scores
            if (data.team1) team1NameEl.textContent = data.team1.name || 'Team 1';
            if (data.team2) team2NameEl.textContent = data.team2.name || 'Team 2';
            team1ScoreEl.textContent = data.team1Score ?? (data.team1 ? 0 : '--');
            team2ScoreEl.textContent = data.team2Score ?? (data.team2 ? 0 : '--');

            if (data.gameTimer) {
                const secs = data.gameTimer.currentSeconds || 0;
                const mins = Math.floor(secs / 60);
                const s    = secs % 60;
                gameTimerVal.textContent = `${mins}:${s.toString().padStart(2, '0')}`;
                gameTimerRunning = data.gameTimer.isRunning;
                gameTimerVal.className = 'timer-display-value ' + (gameTimerRunning ? 'running' : 'stopped');
                gameTimerBox.className = 'timer-display-box'    + (gameTimerRunning ? ' running' : '');
                gameTimerToggle.textContent = gameTimerRunning ? '⏸ Pause' : '▶ Start';
                gameTimerToggle.className   = 'ctrl-btn ' + (gameTimerRunning ? 'btn-pause' : 'btn-start');
            }

            if (data.shotClock) {
                const sc = data.shotClock.seconds;
                shotClockVal.textContent = sc;
                let colorClass = 'stopped';
                let boxClass   = '';
                if (data.shotClock.isRunning) {
                    if (sc <= 5)       { colorClass = 'danger';  boxClass = 'danger'; }
                    else if (sc <= 10) { colorClass = 'warning'; boxClass = 'warning'; }
                    else               { colorClass = 'running'; boxClass = 'running'; }
                }
                shotClockVal.className = 'timer-display-value ' + colorClass;
                shotClockBox.className = 'timer-display-box'    + (boxClass ? ' ' + boxClass : '');
            }
        });

        function toggleGameTimer() {
            sendCommand('gameTimer', gameTimerRunning ? 'pause' : 'start');
        }

        function toggleAdjust() {
            const panel = document.getElementById('adjustPanel');
            const btn   = document.getElementById('adjustToggleBtn');
            const open  = panel.classList.toggle('open');
            btn.classList.toggle('active', open);
        }

        function sendAdjust(target, amount) {
            database.ref('timerCommands').set({
                target,
                command: 'adjust',
                amount,
                timestamp: Date.now()
            }).then(() => {
                const sign  = amount > 0 ? '+' : '';
                const label = target === 'gameTimer'
                    ? (Math.abs(amount) >= 60 ? `Game Timer ${sign}${amount / 60}min` : `Game Timer ${sign}${amount}s`)
                    : `Shot Clock ${sign}${amount}s`;
                showFlash(`✓ ${label}`);
            }).catch(() => showFlash('✗ Failed to send command'));
        }

        function addScore(team, amount) {
            database.ref('timerCommands').set({
                target: team,
                command: 'scoreAdd',
                amount,
                timestamp: Date.now()
            }).then(() => {
                const teamName = team === 'team1'
                    ? (team1NameEl.textContent || 'Team 1')
                    : (team2NameEl.textContent || 'Team 2');
                const sign = amount > 0 ? '+' : '';
                showFlash(`✓ ${sign}${amount} — ${teamName}`);
            }).catch(() => showFlash('✗ Failed to send score'));
        }

        function sendCommand(target, command) {
            database.ref('timerCommands').set({
                target,
                command,
                timestamp: Date.now()
            }).then(() => {
                const label = target === 'gameTimer' ? 'Game Timer' : 'Shot Clock';
                showFlash(`✓ ${command.replace('24', ' 24s').replace('14', ' 14s')} — ${label}`);
            }).catch(() => showFlash('✗ Failed to send command'));
        }

        let flashTimer = null;
        function showFlash(msg) {
            sentFlash.textContent = msg;
            sentFlash.style.opacity = '1';
            clearTimeout(flashTimer);
            flashTimer = setTimeout(() => { sentFlash.style.opacity = '0'; }, 1800);
        }

        let buzzerActive = false;
        function buzzerStart() {
            if (buzzerActive) return;
            buzzerActive = true;
            database.ref('timerCommands').set({ target: 'buzzer', command: 'start', timestamp: Date.now() });
        }
        function buzzerStop() {
            if (!buzzerActive) return;
            buzzerActive = false;
            database.ref('timerCommands').set({ target: 'buzzer', command: 'stop', timestamp: Date.now() });
        }
    </script>
</body>
</html>
